<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта — PagePath</title>
    
    <!-- ПОДКЛЮЧЕНИЕ ШРИФТОВ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lora', serif;
            background-color: #fffad7 !important; /* КРЕМОВЫЙ ФОН */
            color: #1a1a1a;
        }

        /* ТВОЕ ЛИПКОЕ МЕНЮ (без изменений) */
        .bottom-nav {
            position: sticky;
            top: 0;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            background-color: #fffad7;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo { 
            font-family: 'Lora', serif;
            font-size: 1.6rem; 
            font-weight: 700; 
        }

        .nav-links { list-style: none; display: flex; gap: 40px; }

        .nav-links a {
            font-family: 'Montserrat', sans-serif;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: lowercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        /* НОВЫЙ БЛОК ДЛЯ ЦЕНТРАЛЬНОЙ НАДПИСИ */
        .coming-soon-section {
            /* Высота экрана минус высота меню (60px), чтобы надпись была ровно по центру */
            height: calc(100vh - 60px); 
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .coming-soon-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- ШАПКА ОСТАЕТСЯ НА МЕСТЕ -->
    <nav class="bottom-nav">
        <div class="logo">
            <strong>PagePath</strong> & Мастер и Маргарита
        </div>
        <ul class="nav-links">
            <!-- Ссылка ведет обратно на главную страницу -->
            <li><a href="index.html">интро</a></li>
            <li><a href="map.html">карта</a></li>
            <li><a href="characters.html">персонажи</a></li>
            <li><a href="illustrations.html">иллюстрации</a></li>
            <li><a href="forum.html">форум</a></li>
        </ul>
    </nav>

    <!-- НАДПИСЬ ПО ЦЕНТРУ -->
    <section class="coming-soon-section">
        <h1>Скоро здесь появится карта локаций</h1>
    </section>

</body>
</html>
